<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Caderneta</title>
<meta name="description" content="Registro particular de gastos e notas do dia.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2A1E16">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caderneta">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;0,800;1,400&family=Archivo:wght@400;500;600;700&family=Archivo+Narrow:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --couro:#2A1E16;
    --couro-2:#3B2B20;
    --papel:#EFE6D5;
    --papel-2:#E3D8C3;
    --tinta:#241A13;
    --tinta-fraca:#6B5A4A;
    --ouro:#C08A2E;
    --lavoura:#4C6B3C;
    --ferrugem:#9E4425;
    --linha:rgba(42,30,22,.14);
    --r:10px;
    --sombra:0 1px 0 rgba(255,255,255,.5) inset, 0 8px 24px rgba(42,30,22,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--couro);}
  body{
    font-family:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;
    color:var(--tinta);
    min-height:100vh;
    padding:18px 14px 60px;
    background-image:
      radial-gradient(1200px 600px at 50% -10%, rgba(192,138,46,.18), transparent 60%),
      repeating-linear-gradient(115deg, rgba(255,255,255,.014) 0 2px, transparent 2px 5px);
  }
  .wrap{max-width:860px;margin:0 auto}

  /* ---- capa ---- */
  header{
    display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
    padding:0 4px 16px;
  }
  .marca{display:flex;align-items:center;gap:12px}
  .selo{
    width:44px;height:44px;border-radius:50%;
    border:1.5px solid var(--ouro);
    display:grid;place-items:center;flex:none;
    box-shadow:0 0 0 3px rgba(192,138,46,.14);
  }
  .selo span{font-family:'Bitter',serif;font-weight:800;color:var(--ouro);font-size:19px;line-height:1}
  h1{
    font-family:'Bitter',Georgia,serif;font-weight:800;font-size:26px;letter-spacing:-.3px;
    color:var(--papel);line-height:1;
  }
  .sub{
    font-family:'Archivo Narrow','Archivo',sans-serif;
    text-transform:uppercase;letter-spacing:.18em;font-size:10px;
    color:rgba(239,230,213,.5);margin-top:5px;
  }
  .mes{display:flex;align-items:center;gap:6px}
  .mes button{
    width:30px;height:30px;border-radius:8px;border:1px solid rgba(239,230,213,.22);
    background:transparent;color:var(--papel);cursor:pointer;font-size:15px;line-height:1;
  }
  .mes button:hover{border-color:var(--ouro);color:var(--ouro)}
  .mes b{
    font-family:'Archivo Narrow',sans-serif;color:var(--papel);font-size:13px;
    text-transform:uppercase;letter-spacing:.1em;min-width:96px;text-align:center;
  }

  /* ---- folha ---- */
  .folha{
    background:var(--papel);border-radius:var(--r);box-shadow:var(--sombra);
    padding:18px;margin-bottom:14px;
    background-image:linear-gradient(var(--linha) 1px, transparent 1px);
    background-size:100% 30px;background-position:0 -1px;
  }
  .folha.liso{background-image:none}

  h2{
    font-family:'Archivo Narrow',sans-serif;font-weight:600;font-size:11px;
    text-transform:uppercase;letter-spacing:.16em;color:var(--tinta-fraca);
    margin-bottom:12px;
  }

  /* ---- abas ---- */
  nav.abas{display:flex;gap:4px;margin-bottom:14px;padding:0 2px}
  nav.abas button{
    flex:1;padding:9px 6px;border:0;border-radius:8px 8px 0 0;cursor:pointer;
    background:rgba(239,230,213,.07);color:rgba(239,230,213,.6);
    font-family:'Archivo Narrow',sans-serif;font-weight:600;font-size:12px;
    text-transform:uppercase;letter-spacing:.12em;
  }
  nav.abas button[aria-selected="true"]{background:var(--papel);color:var(--tinta)}
  nav.abas button:focus-visible{outline:2px solid var(--ouro);outline-offset:2px}

  /* ---- resumo ---- */
  .cartoes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .cartao{
    background:var(--papel);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sombra);
    border-left:3px solid var(--linha);
  }
  .cartao .rot{
    font-family:'Archivo Narrow',sans-serif;font-size:10px;text-transform:uppercase;
    letter-spacing:.13em;color:var(--tinta-fraca);
  }
  .cartao .val{font-family:'Bitter',serif;font-weight:800;font-size:19px;margin-top:5px;letter-spacing:-.5px}
  .cartao.g{border-left-color:var(--ferrugem)}
  .cartao.d{border-left-color:var(--couro-2)}
  .cartao.r{border-left-color:var(--lavoura)}
  .cartao.s{border-left-color:var(--ouro)}
  .cartao small{display:block;font-size:10px;color:var(--tinta-fraca);margin-top:3px}

  /* ---- form ---- */
  .form{display:grid;grid-template-columns:1.6fr .8fr 1fr .9fr auto;gap:8px;align-items:end}
  .campo{display:flex;flex-direction:column;gap:4px;min-width:0}
  label{
    font-family:'Archivo Narrow',sans-serif;font-size:10px;text-transform:uppercase;
    letter-spacing:.1em;color:var(--tinta-fraca);
  }
  input,select,textarea{
    font-family:'Archivo',sans-serif;font-size:14px;color:var(--tinta);
    background:rgba(255,255,255,.55);border:1px solid var(--linha);border-radius:7px;
    padding:8px 9px;width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--ouro);outline-offset:0;border-color:transparent}
  .btn{
    background:var(--couro);color:var(--papel);border:0;border-radius:7px;padding:9px 16px;
    font-family:'Archivo Narrow',sans-serif;font-weight:600;font-size:12px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;
  }
  .btn:hover{background:var(--couro-2)}
  .btn.fantasma{background:transparent;color:var(--tinta-fraca);border:1px solid var(--linha)}
  .btn.fantasma:hover{color:var(--tinta);border-color:var(--tinta-fraca)}
  .btn:focus-visible{outline:2px solid var(--ouro);outline-offset:2px}
  #pessoaCampo{display:none}

  /* ---- lista ---- */
  .filtros{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .chip{
    border:1px solid var(--linha);background:transparent;border-radius:99px;padding:5px 11px;
    font-family:'Archivo Narrow',sans-serif;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--tinta-fraca);cursor:pointer;
  }
  .chip[aria-pressed="true"]{background:var(--couro);color:var(--papel);border-color:var(--couro)}

  .item{
    display:grid;grid-template-columns:34px 1fr auto auto;gap:11px;align-items:center;
    padding:9px 2px;border-bottom:1px solid var(--linha);
  }
  .item:last-child{border-bottom:0}
  .dia{
    font-family:'Bitter',serif;font-weight:800;font-size:15px;color:var(--tinta-fraca);
    text-align:center;line-height:1;
  }
  .dia i{display:block;font-style:normal;font-family:'Archivo Narrow',sans-serif;font-weight:500;font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;opacity:.65}
  .desc{font-size:14px;font-weight:500;min-width:0}
  .desc em{
    display:block;font-style:normal;font-family:'Archivo Narrow',sans-serif;
    font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tinta-fraca);margin-top:2px;
  }
  .valor{font-family:'Bitter',serif;font-weight:600;font-size:15px;white-space:nowrap}
  .valor.neg{color:var(--ferrugem)}
  .valor.pos{color:var(--lavoura)}
  .acoes{display:flex;gap:4px}
  .ico{
    width:26px;height:26px;border:1px solid var(--linha);background:transparent;border-radius:6px;
    cursor:pointer;color:var(--tinta-fraca);font-size:12px;line-height:1;display:grid;place-items:center;
  }
  .ico:hover{border-color:var(--tinta-fraca);color:var(--tinta)}
  .quitado .desc,.quitado .valor{opacity:.42;text-decoration:line-through}
  .vazio{padding:26px 0;text-align:center;color:var(--tinta-fraca);font-size:13px}
  .vazio b{display:block;font-family:'Bitter',serif;font-size:15px;color:var(--tinta);margin-bottom:4px}

  /* ---- barras ---- */
  .barra{display:grid;grid-template-columns:130px 1fr 96px;gap:10px;align-items:center;margin-bottom:9px}
  .barra .n{font-family:'Archivo Narrow',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--tinta-fraca)}
  .trilho{height:9px;background:rgba(42,30,22,.08);border-radius:99px;overflow:hidden}
  .fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .barra .v{font-family:'Bitter',serif;font-weight:600;font-size:13px;text-align:right}

  /* ---- notas ---- */
  textarea{min-height:150px;resize:vertical;line-height:1.65;font-size:14px;background:transparent;border:0;padding:0}
  textarea:focus{outline:0}
  .notaCab{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
  .notaCab .d{font-family:'Bitter',serif;font-weight:800;font-size:17px}
  .salvo{font-family:'Archivo Narrow',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--lavoura);opacity:0;transition:opacity .3s}
  .salvo.on{opacity:1}
  .diasNota{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--linha)}
  .diasNota button{
    border:1px solid var(--linha);background:transparent;border-radius:6px;padding:4px 8px;cursor:pointer;
    font-family:'Archivo Narrow',sans-serif;font-size:11px;color:var(--tinta-fraca);
  }
  .diasNota button.ativo{background:var(--ouro);border-color:var(--ouro);color:#fff}

  footer{
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    padding:4px 4px 0;
  }
  .rodape-txt{font-family:'Archivo Narrow',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(239,230,213,.35)}
  .rodape-btns{display:flex;gap:6px}
  .rodape-btns .btn{background:transparent;border:1px solid rgba(239,230,213,.2);color:rgba(239,230,213,.65)}
  .rodape-btns .btn:hover{border-color:var(--ouro);color:var(--ouro)}

  [hidden]{display:none !important}

  @media (max-width:720px){
    .cartoes{grid-template-columns:1fr 1fr}
    .form{grid-template-columns:1fr 1fr}
    .form .campo:first-child{grid-column:1/-1}
    .form .btn{grid-column:1/-1}
    .barra{grid-template-columns:88px 1fr 78px}
    header{flex-direction:column;align-items:flex-start}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="marca">
      <div class="selo"><span>AL</span></div>
      <div>
        <h1>Caderneta</h1>
        <div class="sub">Registro particular · <span id="hoje"></span></div>
      </div>
    </div>
    <div class="mes">
      <button id="mesAnt" aria-label="Mês anterior">‹</button>
      <b id="mesLabel"></b>
      <button id="mesProx" aria-label="Próximo mês">›</button>
    </div>
  </header>

  <div class="cartoes">
    <div class="cartao g"><div class="rot">Gastos do mês</div><div class="val" id="cGastos">—</div><small id="cGastosSub"></small></div>
    <div class="cartao d"><div class="rot">Devo</div><div class="val" id="cDivida">—</div><small id="cDividaSub"></small></div>
    <div class="cartao r"><div class="rot">A receber</div><div class="val" id="cReceber">—</div><small id="cReceberSub"></small></div>
    <div class="cartao s"><div class="rot">Saldo aberto</div><div class="val" id="cSaldo">—</div><small>a receber − devo</small></div>
  </div>

  <nav class="abas" role="tablist">
    <button role="tab" id="tab-lanc" aria-selected="true">Lançamentos</button>
    <button role="tab" id="tab-notas" aria-selected="false">Notas do dia</button>
    <button role="tab" id="tab-resumo" aria-selected="false">Resumo</button>
  </nav>

  <!-- LANÇAMENTOS -->
  <section id="pnl-lanc">
    <div class="folha liso">
      <h2>Novo lançamento</h2>
      <div class="form">
        <div class="campo">
          <label for="fDesc">O que foi</label>
          <input id="fDesc" placeholder="Diesel da caminhonete, almoço, camisa...">
        </div>
        <div class="campo">
          <label for="fValor">Valor</label>
          <input id="fValor" inputmode="decimal" placeholder="0,00">
        </div>
        <div class="campo">
          <label for="fTipo">Tipo</label>
          <select id="fTipo">
            <option value="pessoal">Gasto pessoal</option>
            <option value="online">Gasto online</option>
            <option value="terceiro">Gasto p/ outra pessoa</option>
            <option value="divida">Dívida (devo)</option>
            <option value="receber">A receber</option>
          </select>
        </div>
        <div class="campo">
          <label for="fData">Data</label>
          <input id="fData" type="date">
        </div>
        <button class="btn" id="fSalvar">Lançar</button>
        <div class="campo" id="pessoaCampo" style="grid-column:1/-1">
          <label for="fPessoa">Quem</label>
          <input id="fPessoa" placeholder="Nome da pessoa">
        </div>
      </div>
    </div>

    <div class="folha">
      <div class="filtros" id="filtros"></div>
      <div id="lista"></div>
    </div>
  </section>

  <!-- NOTAS -->
  <section id="pnl-notas" hidden>
    <div class="folha">
      <div class="notaCab">
        <div class="d" id="notaData"></div>
        <div class="salvo" id="notaSalvo">Salvo</div>
      </div>
      <textarea id="notaTxt" placeholder="Como foi o dia. Visita em fazenda, o que ficou pendente, ideia que apareceu..."></textarea>
      <div class="diasNota" id="diasNota"></div>
    </div>
  </section>

  <!-- RESUMO -->
  <section id="pnl-resumo" hidden>
    <div class="folha liso">
      <h2>Para onde foi o dinheiro <span id="resumoMes"></span></h2>
      <div id="barras"></div>
    </div>
    <div class="folha liso">
      <h2>Em aberto (todos os meses)</h2>
      <div id="abertos"></div>
    </div>
  </section>

  <footer>
    <div class="rodape-txt">Tudo fica só neste aparelho · <span id="contagem"></span></div>
    <div class="rodape-btns">
      <button class="btn" id="btnExp">Exportar backup</button>
      <button class="btn" id="btnImp">Importar</button>
      <input type="file" id="fileImp" accept="application/json" hidden>
    </div>
  </footer>
</div>

<script>
const CHAVE='caderneta.v1';
const TIPOS={
  pessoal:{nome:'Pessoal',cor:'#9E4425',sinal:-1},
  online:{nome:'Online',cor:'#C08A2E',sinal:-1},
  terceiro:{nome:'P/ outra pessoa',cor:'#7A5C3E',sinal:-1},
  divida:{nome:'Dívida',cor:'#2A1E16',sinal:0},
  receber:{nome:'A receber',cor:'#4C6B3C',sinal:0}
};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DSEM=['dom','seg','ter','qua','qui','sex','sáb'];

let dados={lancamentos:[],notas:{}};
let ref=new Date();
let filtro='todos';
let notaDia=iso(new Date());

/* ---------- armazenamento ---------- */
function carregar(){
  try{
    const b=localStorage.getItem(CHAVE);
    if(b) dados=Object.assign({lancamentos:[],notas:{}},JSON.parse(b));
  }catch(e){ console.warn('Não consegui ler o armazenamento local.',e); }
}
function salvar(){
  try{ localStorage.setItem(CHAVE,JSON.stringify(dados)); }
  catch(e){ alert('Não deu para salvar. Se você abriu o arquivo em aba anônima, os dados não ficam guardados.'); }
}

/* ---------- utilidades ---------- */
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function deIso(s){const[a,m,d]=s.split('-').map(Number);return new Date(a,m-1,d);}
function brl(n){return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function numero(s){
  s=String(s).trim().replace(/[R$\s]/g,'');
  if(s.includes(',')) s=s.replace(/\./g,'').replace(',','.');
  const n=parseFloat(s);
  return isNaN(n)?null:Math.abs(n);
}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function doMes(l){const d=deIso(l.data);return d.getMonth()===ref.getMonth()&&d.getFullYear()===ref.getFullYear();}

/* ---------- render ---------- */
function render(){
  document.getElementById('mesLabel').textContent=MESES[ref.getMonth()]+' '+ref.getFullYear();
  document.getElementById('resumoMes').textContent='· '+MESES[ref.getMonth()].toLowerCase();
  cartoes(); filtros(); lista(); barras(); abertos();
  document.getElementById('contagem').textContent=dados.lancamentos.length+' lançamentos';
}

function cartoes(){
  const mes=dados.lancamentos.filter(doMes);
  const gastos=mes.filter(l=>TIPOS[l.tipo].sinal===-1).reduce((s,l)=>s+l.valor,0);
  const terceiro=mes.filter(l=>l.tipo==='terceiro').reduce((s,l)=>s+l.valor,0);
  const devo=dados.lancamentos.filter(l=>l.tipo==='divida'&&!l.quitado).reduce((s,l)=>s+l.valor,0);
  const rec=dados.lancamentos.filter(l=>l.tipo==='receber'&&!l.quitado).reduce((s,l)=>s+l.valor,0);
  const nD=dados.lancamentos.filter(l=>l.tipo==='divida'&&!l.quitado).length;
  const nR=dados.lancamentos.filter(l=>l.tipo==='receber'&&!l.quitado).length;

  document.getElementById('cGastos').textContent=brl(gastos);
  document.getElementById('cGastosSub').textContent=terceiro>0?brl(terceiro)+' foi p/ outra pessoa':'pessoal + online + terceiros';
  document.getElementById('cDivida').textContent=brl(devo);
  document.getElementById('cDividaSub').textContent=nD===1?'1 em aberto':nD+' em aberto';
  document.getElementById('cReceber').textContent=brl(rec);
  document.getElementById('cReceberSub').textContent=nR===1?'1 em aberto':nR+' em aberto';
  const saldo=rec-devo;
  const el=document.getElementById('cSaldo');
  el.textContent=brl(saldo);
  el.style.color=saldo<0?'var(--ferrugem)':saldo>0?'var(--lavoura)':'var(--tinta)';
}

function filtros(){
  const c=document.getElementById('filtros');
  const opcoes=[['todos','Tudo'],...Object.entries(TIPOS).map(([k,v])=>[k,v.nome])];
  c.innerHTML=opcoes.map(([k,n])=>
    `<button class="chip" data-f="${k}" aria-pressed="${filtro===k}">${n}</button>`).join('');
  c.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filtro=b.dataset.f;render();});
}

function lista(){
  const c=document.getElementById('lista');
  let itens=dados.lancamentos.filter(doMes);
  if(filtro!=='todos') itens=itens.filter(l=>l.tipo===filtro);
  itens.sort((a,b)=>b.data.localeCompare(a.data)||b.id.localeCompare(a.id));

  if(!itens.length){
    c.innerHTML=`<div class="vazio"><b>Nada anotado aqui ainda</b>Lance o primeiro gasto do mês no campo acima.</div>`;
    return;
  }
  c.innerHTML=itens.map(l=>{
    const t=TIPOS[l.tipo], d=deIso(l.data);
    const aberto=(l.tipo==='divida'||l.tipo==='receber');
    const cls=t.sinal===-1?'neg':(l.tipo==='receber'?'pos':'');
    const sinal=t.sinal===-1?'−':(l.tipo==='receber'?'+':'');
    return `<div class="item ${l.quitado?'quitado':''}">
      <div class="dia">${d.getDate()}<i>${DSEM[d.getDay()]}</i></div>
      <div class="desc">${esc(l.desc)}<em>${t.nome}${l.pessoa?' · '+esc(l.pessoa):''}${l.quitado?' · quitado':''}</em></div>
      <div class="valor ${cls}">${sinal}${brl(l.valor)}</div>
      <div class="acoes">
        ${aberto?`<button class="ico" data-q="${l.id}" title="${l.quitado?'Reabrir':'Marcar como quitado'}">${l.quitado?'↺':'✓'}</button>`:''}
        <button class="ico" data-x="${l.id}" title="Apagar">✕</button>
      </div>
    </div>`;
  }).join('');
  c.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{
    const l=dados.lancamentos.find(x=>x.id===b.dataset.q);
    l.quitado=!l.quitado; salvar(); render();
  });
  c.querySelectorAll('[data-x]').forEach(b=>b.onclick=()=>{
    const l=dados.lancamentos.find(x=>x.id===b.dataset.x);
    if(confirm('Apagar "'+l.desc+'"? Isso não volta.')){
      dados.lancamentos=dados.lancamentos.filter(x=>x.id!==b.dataset.x); salvar(); render();
    }
  });
}

function barras(){
  const c=document.getElementById('barras');
  const mes=dados.lancamentos.filter(doMes);
  const soma={};
  Object.keys(TIPOS).forEach(k=>soma[k]=mes.filter(l=>l.tipo===k).reduce((s,l)=>s+l.valor,0));
  const max=Math.max(...Object.values(soma),1);
  const total=Object.values(soma).reduce((a,b)=>a+b,0);
  if(!total){c.innerHTML=`<div class="vazio"><b>Mês em branco</b>Assim que houver lançamentos, o desenho aparece aqui.</div>`;return;}
  c.innerHTML=Object.entries(TIPOS).map(([k,t])=>`
    <div class="barra">
      <div class="n">${t.nome}</div>
      <div class="trilho"><div class="fill" style="width:${(soma[k]/max*100).toFixed(1)}%;background:${t.cor}"></div></div>
      <div class="v">${brl(soma[k])}</div>
    </div>`).join('');
}

function abertos(){
  const c=document.getElementById('abertos');
  const itens=dados.lancamentos.filter(l=>(l.tipo==='divida'||l.tipo==='receber')&&!l.quitado)
    .sort((a,b)=>a.data.localeCompare(b.data));
  if(!itens.length){c.innerHTML=`<div class="vazio"><b>Ninguém te deve, você não deve ninguém</b>Boa hora essa.</div>`;return;}
  c.innerHTML=itens.map(l=>{
    const d=deIso(l.data);
    return `<div class="item">
      <div class="dia">${d.getDate()}<i>${MESES[d.getMonth()].slice(0,3)}</i></div>
      <div class="desc">${esc(l.desc)}<em>${TIPOS[l.tipo].nome}${l.pessoa?' · '+esc(l.pessoa):''}</em></div>
      <div class="valor ${l.tipo==='receber'?'pos':'neg'}">${l.tipo==='receber'?'+':'−'}${brl(l.valor)}</div>
      <div></div>
    </div>`;
  }).join('');
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

/* ---------- notas ---------- */
function renderNota(){
  const d=deIso(notaDia);
  document.getElementById('notaData').textContent=d.getDate()+' de '+MESES[d.getMonth()].toLowerCase()+', '+DSEM[d.getDay()];
  document.getElementById('notaTxt').value=dados.notas[notaDia]||'';
  const dias=new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();
  const c=document.getElementById('diasNota');
  let h='';
  for(let i=1;i<=dias;i++){
    const s=iso(new Date(ref.getFullYear(),ref.getMonth(),i));
    const tem=!!(dados.notas[s]||'').trim();
    h+=`<button data-d="${s}" class="${s===notaDia?'ativo':''}" style="${tem&&s!==notaDia?'border-color:var(--ouro);color:var(--tinta)':''}">${i}</button>`;
  }
  c.innerHTML=h;
  c.querySelectorAll('button').forEach(b=>b.onclick=()=>{notaDia=b.dataset.d;renderNota();});
}
let tmr;
document.getElementById('notaTxt').addEventListener('input',e=>{
  clearTimeout(tmr);
  tmr=setTimeout(()=>{
    const v=e.target.value;
    if(v.trim()) dados.notas[notaDia]=v; else delete dados.notas[notaDia];
    salvar(); renderNota();
    const s=document.getElementById('notaSalvo');
    s.classList.add('on'); setTimeout(()=>s.classList.remove('on'),1200);
  },600);
});

/* ---------- abas ---------- */
const abas={'tab-lanc':'pnl-lanc','tab-notas':'pnl-notas','tab-resumo':'pnl-resumo'};
Object.keys(abas).forEach(t=>{
  document.getElementById(t).onclick=()=>{
    Object.entries(abas).forEach(([k,p])=>{
      document.getElementById(k).setAttribute('aria-selected',k===t);
      document.getElementById(p).hidden=(k!==t);
    });
    if(t==='tab-notas') renderNota();
  };
});

/* ---------- lançar ---------- */
document.getElementById('fTipo').addEventListener('change',e=>{
  document.getElementById('pessoaCampo').style.display=
    (e.target.value==='terceiro'||e.target.value==='divida'||e.target.value==='receber')?'flex':'none';
});
function lancar(){
  const desc=document.getElementById('fDesc').value.trim();
  const valor=numero(document.getElementById('fValor').value);
  const tipo=document.getElementById('fTipo').value;
  const data=document.getElementById('fData').value;
  if(!desc){alert('Escreva o que foi esse lançamento.');return;}
  if(valor===null||valor===0){alert('Coloque um valor. Pode usar vírgula: 149,90');return;}
  if(!data){alert('Escolha a data.');return;}
  dados.lancamentos.push({
    id:id(),desc,valor,tipo,data,
    pessoa:document.getElementById('fPessoa').value.trim()||null,
    quitado:false
  });
  salvar();
  document.getElementById('fDesc').value='';
  document.getElementById('fValor').value='';
  document.getElementById('fPessoa').value='';
  const d=deIso(data);
  if(d.getMonth()!==ref.getMonth()||d.getFullYear()!==ref.getFullYear()) ref=d;
  render();
  document.getElementById('fDesc').focus();
}
document.getElementById('fSalvar').onclick=lancar;
['fDesc','fValor','fPessoa'].forEach(i=>document.getElementById(i)
  .addEventListener('keydown',e=>{if(e.key==='Enter')lancar();}));

/* ---------- mês ---------- */
document.getElementById('mesAnt').onclick=()=>{ref=new Date(ref.getFullYear(),ref.getMonth()-1,1);render();renderNota();};
document.getElementById('mesProx').onclick=()=>{ref=new Date(ref.getFullYear(),ref.getMonth()+1,1);render();renderNota();};

/* ---------- backup ---------- */
document.getElementById('btnExp').onclick=()=>{
  const b=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='caderneta-'+iso(new Date())+'.json';
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('btnImp').onclick=()=>document.getElementById('fileImp').click();
document.getElementById('fileImp').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const j=JSON.parse(r.result);
      if(!Array.isArray(j.lancamentos)) throw new Error('formato');
      if(!confirm('Isso substitui o que está aqui pelos dados do arquivo. Continuar?')) return;
      dados={lancamentos:j.lancamentos,notas:j.notas||{}};
      salvar(); render(); renderNota();
    }catch(err){ alert('Esse arquivo não é um backup da Caderneta.'); }
  };
  r.readAsText(f);
  e.target.value='';
};

/* ---------- offline ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

/* ---------- início ---------- */
carregar();
document.getElementById('fData').value=iso(new Date());
document.getElementById('hoje').textContent=new Date().toLocaleDateString('pt-BR');
render();
renderNota();
</script>
</body>
</html>
